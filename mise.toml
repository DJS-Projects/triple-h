[tools]
python = "3.12"
bun = "latest"
"npm:@dotenvx/dotenvx" = "latest"
"pipx:pre-commit" = "latest"
node = "latest"

# ── Setup ───────────────────────────────────────────────────────────────────

[tasks.setup]
description = "Install all dependencies"
depends = ["setup:be", "setup:fe"]

[tasks."setup:be"]
description = "Install backend dependencies"
run = "cd fastapi_backend && uv sync"

[tasks."setup:fe"]
description = "Install frontend dependencies"
run = "cd nextjs-frontend && bun install"

[tasks."setup:hooks"]
description = "Install pre-commit git hooks"
run = "pre-commit install"

# ── Dev ─────────────────────────────────────────────────────────────────────

[tasks."be:dev"]
description = "Run FastAPI backend"
run = "cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run uvicorn app.main:app --reload --port 8000"

[tasks."fe:dev"]
description = "Run Next.js frontend"
run = "cd nextjs-frontend && dotenvx run -fk ../.env.keys -- bun run dev"

# ── Backend Testing ─────────────────────────────────────────────────────────

[tasks."test:db:up"]
description = "Start ephemeral test Postgres on host port 5433"
run = "docker compose --profile test up -d --wait test-db"

[tasks."test:db:down"]
description = "Stop and remove the test Postgres container"
run = "docker compose --profile test rm -sf test-db"

[tasks."test:db:reset"]
description = "Recreate the test Postgres (fresh schema)"
depends = ["test:db:down"]
run = "docker compose --profile test up -d --wait test-db"

[tasks."be:test"]
description = "Run backend unit tests (auto-starts + tears down test DB)"
depends = ["test:db:up"]
# Trap EXIT so the test-db container always comes down — even when
# pytest fails or the run is interrupted with Ctrl-C. Stale containers
# eat memory and the next `mise be:test` would hit a port-bound 5433.
run = """
trap 'docker compose --profile test rm -sf test-db >/dev/null 2>&1' EXIT
cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run pytest tests/ -v"""

[tasks."be:test:eval"]
description = "Run E2E eval tests (requires API key)"
run = "cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run pytest tests_eval/ -m eval -v"

[tasks."be:test:all"]
description = "Run all backend tests (auto-starts + tears down test DB)"
depends = ["test:db:up"]
run = """
trap 'docker compose --profile test rm -sf test-db >/dev/null 2>&1' EXIT
cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run pytest -v"""

# ── Frontend Testing ────────────────────────────────────────────────────────

[tasks."fe:test"]
description = "Run frontend tests"
run = "cd nextjs-frontend && dotenvx run -fk ../.env.keys -- bun test"

# ── Quality ─────────────────────────────────────────────────────────────────

[tasks."be:lint"]
description = "Run backend linter"
run = "cd fastapi_backend && uv run ruff check ."

[tasks."be:format"]
description = "Format backend code"
run = "cd fastapi_backend && uv run ruff format ."

[tasks."be:typecheck"]
description = "Run backend type checker"
run = "cd fastapi_backend && uv run mypy app/"

[tasks."be:check"]
description = "Run all backend checks (lint + typecheck + format)"
depends = ["be:lint", "be:typecheck"]
run = "cd fastapi_backend && uv run ruff format --check ."

[tasks."fe:lint"]
description = "Run frontend linter"
run = "cd nextjs-frontend && bunx biome check ."

[tasks."fe:format"]
description = "Format frontend code"
run = "cd nextjs-frontend && bunx biome check --write ."

# ── Env ─────────────────────────────────────────────────────────────────────

[tasks."env:encrypt"]
description = "Encrypt all .env files"
run = "dotenvx encrypt -fk .env.keys -f fastapi_backend/.env && dotenvx encrypt -fk .env.keys -f nextjs-frontend/.env"

[tasks."env:decrypt"]
description = "Decrypt all .env files"
run = "dotenvx decrypt -fk .env.keys -f fastapi_backend/.env && dotenvx decrypt -fk .env.keys -f nextjs-frontend/.env"

# Interactive: paste a secret into one of the .env files without the
# plaintext appearing in your shell history, the agent transcript, or
# the file itself (dotenvx encrypts it via .env.keys before write).
# Implementation in scripts/env_addkey.py — Python stdlib only, no
# chmod or shebang dance, cross-platform getpass for silent paste.
#
# Run this from your own terminal — DO NOT pipe through an agent's
# Bash tool, since the silent paste relies on a real TTY.
[tasks."env:addkey"]
description = "Paste a secret into fastapi_backend/.env or nextjs-frontend/.env (encrypts via dotenvx, hides plaintext from logs)"
run = "python3 scripts/env_addkey.py"

# ── Database ────────────────────────────────────────────────────────────────

[tasks."be:db:migrate"]
description = "Run alembic migrations"
run = "cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run alembic upgrade head"

[tasks."be:db:revision"]
description = "Create new alembic migration"
run = "cd fastapi_backend && dotenvx run -fk ../.env.keys -- uv run alembic revision --autogenerate"

# ── Docker ──────────────────────────────────────────────────────────────────

[tasks."docker:up"]
description = "Start all services via Docker Compose"
# --overload: the encrypted .env is authoritative for this project. Without
# this flag, dotenvx leaves shell-exported vars in place (default behavior),
# which means a user-wide ~/.zshrc / ~/.bashrc export like
# `export OLLAMA_API_KEY=ollama` (placeholder for local Ollama CLI) silently
# shadows the real cloud key in the encrypted .env. Symptom: LiteLLM
# cascades through invalid-key retries, log flood, traces never land.
run = "dotenvx run --overload -fk .env.keys -f fastapi_backend/.env -f nextjs-frontend/.env -- docker compose up --build -d"

[tasks."docker:rebuild"]
description = "Rebuild + force-recreate a service (defaults to backend) so code changes baked into the image actually run"
# `mise docker:up`'s --build flag rebuilds when the Dockerfile or COPY
# inputs change, but compose may still reuse the previous container if
# the image SHA hasn't changed in a way it notices. After editing
# fastapi_backend code, run `mise docker:rebuild` to force both a
# rebuild AND a container recreation. Pass a service name to target
# something other than backend: `mise docker:rebuild -- frontend`.
run = "dotenvx run --overload -fk .env.keys -f fastapi_backend/.env -f nextjs-frontend/.env -- docker compose up -d --build --force-recreate ${1:-backend}"

[tasks."docker:watch"]
description = "Start all services with file watch (foreground)"
run = "dotenvx run --overload -fk .env.keys -f fastapi_backend/.env -f nextjs-frontend/.env -- docker compose up --build --watch"

[tasks."docker:down"]
description = "Stop all services"
run = "docker compose down"

[tasks."docker:reset"]
description = "Stop all services and wipe volumes"
run = "docker compose down -v"

[tasks."docker:logs"]
description = "Tail Docker Compose logs"
run = "docker compose logs -f"
