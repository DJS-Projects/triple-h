[tools]
python = "3.12"
bun = "latest"

# --- Setup ---

[tasks.setup]
description = "Install all dependencies and hooks"
depends = ["setup:backend", "setup:frontend", "setup:hooks"]

[tasks."setup:backend"]
description = "Install Python dependencies"
run = "uv sync"

[tasks."setup:frontend"]
description = "Install frontend dependencies"
run = "cd frontend && bun install"

[tasks."setup:hooks"]
description = "Install pre-commit hooks"
run = "uv run pre-commit install"

# --- Env ---

[tasks.encrypt]
description = "Encrypt .env files with dotenvx"
run = "dotenvx encrypt"

[tasks.decrypt]
description = "Decrypt .env files with dotenvx"
run = "dotenvx decrypt"

# --- Dev ---

[tasks.dev-backend]
description = "Run doc_extractor backend"
run = "cd backend/doc_extractor && dotenvx run -f ../../.env -- uv run uvicorn app:app --reload --port 8002"

[tasks.dev-frontend]
description = "Run Next.js frontend"
run = "dotenvx run -- bun run --cwd frontend dev"

# --- Backend checks (Python) ---

[tasks.lint]
description = "Run ruff linter on backend"
run = "uv run ruff check backend/"

[tasks.format]
description = "Run ruff formatter on backend"
run = "uv run ruff format backend/"

[tasks.typecheck]
description = "Run mypy on backend"
run = "uv run mypy backend/doc_extractor/"

# --- Frontend checks (Biome) ---

[tasks."fe:check"]
description = "Run biome check on frontend"
run = "cd frontend && bunx biome check ."

[tasks."fe:lint"]
description = "Run biome lint on frontend"
run = "cd frontend && bunx biome lint ."

[tasks."fe:format"]
description = "Run biome format on frontend"
run = "cd frontend && bunx biome format --write ."

# --- All checks ---

[tasks.check]
description = "Run all checks (backend + frontend)"
depends = ["lint", "typecheck", "fe:check"]
run = "uv run ruff format --check backend/"
