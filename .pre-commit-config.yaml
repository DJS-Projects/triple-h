repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        # Pre-commit runs mypy in an isolated venv — the project's
        # `.venv` is invisible. Install the libs whose types/plugin we
        # depend on (pydantic v2 plugin, ORM types) so subclass-of-Any
        # cascade errors don't fire. Keep this list minimal; mypy
        # config drives plugin activation (see fastapi_backend/mypy.ini).
        additional_dependencies:
          - "types-aiofiles>=24.1,<25"
          - "pydantic>=2,<3"
          - "pydantic-settings>=2,<3"
          - "sqlalchemy>=2,<3"
          - "fastapi-users[sqlalchemy]>=13,<14"
        args: [--ignore-missing-imports, --config-file=fastapi_backend/mypy.ini]
        files: ^fastapi_backend/

  - repo: local
    hooks:
      - id: check-env-encrypted
        name: Verify .env files encrypted with dotenvx
        entry: python3 scripts/check_env_encrypted.py
        language: system
        pass_filenames: false
        always_run: true
