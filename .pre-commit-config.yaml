repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-aiofiles>=24.1,<25"]
        args: [--ignore-missing-imports]
        files: ^fastapi_backend/

  - repo: local
    hooks:
      - id: check-env-encrypted
        name: Verify .env files encrypted with dotenvx
        entry: python3 scripts/check_env_encrypted.py
        language: system
        pass_filenames: false
        always_run: true
