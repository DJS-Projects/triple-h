# LiteLLM proxy config — Triple-H
#
# Open-weights models only. Hosted endpoints are fine (Groq, NIM,
# Google AI Studio for Gemma, Doubleword) as long as the underlying
# model is open-source — no Gemini, no GPT, no Claude.
#
# Model names are concrete (provider + family + size) so the FE
# dropdown can show real choices. The proxy handles API key
# plumbing, retries, and cross-provider fallbacks.
#
# Multi-image policy:
#   - Gemma 4 31B: vision-capable, multi-image, big output budget.
#   - Groq Llama 4 (Scout/Maverick): vision-capable, multi-image OK,
#     but tight max_completion_tokens — must bump explicitly.
#   - NVIDIA NIM (Llama 3.2 90B Vision): hard 1-image-per-request
#     limit. Only useful for single-page docs / classification.
#
# Provider preference for Gemma 4 31B:
#   - ollama-gemma4-31b (Ollama Cloud) is primary — faster than
#     Google AI Studio for our doc workload and not subject to the
#     AI-Studio daily quota.
#   - gemma-4-31b (Google AI Studio) is the fallback for when Ollama
#     Cloud is throttled / down.

model_list:
  # ── Groq Llama 4 (vision, multi-image, fast, free tier) ───────────────
  - model_name: groq-llama4-scout
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  - model_name: groq-llama4-maverick
    litellm_params:
      model: groq/meta-llama/llama-4-maverick-17b-128e-instruct
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  # ── NVIDIA NIM Llama 3.2 90B Vision (1 image per request) ─────────────
  - model_name: nim-llama-90b-vision
    litellm_params:
      model: nvidia_nim/meta/llama-3.2-90b-vision-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY

  # ── Doubleword Qwen3.5-397B (text-only, schema-enforced via dottxt) ───
  - model_name: doubleword-qwen3.5
    litellm_params:
      model: openai/Qwen/Qwen3.5-397B-A17B-FP8-dottxt
      api_base: https://api.doubleword.ai/v1
      api_key: os.environ/DOUBLEWORD_API_KEY

  # ── Groq Llama 3.3 70B (text-only chat) ───────────────────────────────
  - model_name: groq-llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── Ollama Cloud Gemma 4 31B (vision, primary extractor) ──────────────
  # Ollama Cloud (https://ollama.com) hosts Gemma 4 alongside dozens of
  # open-weights models. Auth is Bearer-token via OLLAMA_API_KEY (issue
  # at https://ollama.com/settings/keys). We use the OpenAI-compatible
  # path (/v1/chat/completions) for vision-payload reliability — the
  # native /api/chat path also works but the OpenAI-compat shape avoids
  # an extra image-encoding code path inside LiteLLM.
  - model_name: ollama-gemma4-31b
    litellm_params:
      model: openai/gemma4:31b
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
      max_tokens: 8192

  # ── Google Gemma 4 31B (vision, open-weights, fallback for Ollama) ────
  - model_name: gemma-4-31b
    litellm_params:
      model: gemini/gemma-4-31b-it
      api_key: os.environ/GOOGLE_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 5
  fallbacks:
    # Primary path: Ollama Cloud → Google AI Studio → Groq cascade.
    - ollama-gemma4-31b: ["gemma-4-31b", "groq-llama4-scout", "groq-llama4-maverick"]
    # Direct gemma-4-31b calls (legacy / FE-pinned) keep their old chain.
    - gemma-4-31b: ["ollama-gemma4-31b", "groq-llama4-scout", "groq-llama4-maverick"]
    - groq-llama4-scout: ["groq-llama4-maverick", "ollama-gemma4-31b", "gemma-4-31b"]
    - groq-llama4-maverick: ["ollama-gemma4-31b", "gemma-4-31b"]
    # NIM is single-image-only — no useful fallback for multi-page.
    - nim-llama-90b-vision: ["ollama-gemma4-31b", "gemma-4-31b"]

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
