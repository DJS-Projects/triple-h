# LiteLLM proxy config — Triple-H
#
# Virtual model names (used by backend):
#   vision-primary    — Groq Llama 4 Scout (free, fast, vision)
#   vision-fallback-1 — NIM Llama 3.2 90B Vision
#   structured-primary — Doubleword Qwen3.5-397B + dottxt (text-only, schema-enforced)
#   chat-primary       — Groq Llama 3.3 70B (text chat)
#
# Fallbacks chain on rate-limit / error.

model_list:
  # ── Primary: Groq Llama 4 Scout (vision-capable) ───────────────────────
  - model_name: vision-primary
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY

  - model_name: vision-primary-large
    litellm_params:
      model: groq/meta-llama/llama-4-maverick-17b-128e-instruct
      api_key: os.environ/GROQ_API_KEY

  # ── Fallback: NVIDIA NIM Llama 3.2 90B Vision ──────────────────────────
  - model_name: vision-fallback-1
    litellm_params:
      model: nvidia_nim/meta/llama-3.2-90b-vision-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY

  # ── Structured-output specialist: Doubleword Qwen3.5-397B (dottxt) ─────
  # Text-only but server-enforced JSON schema via dottxt/outlines.
  - model_name: structured-primary
    litellm_params:
      model: openai/Qwen/Qwen3.5-397B-A17B-FP8-dottxt
      api_base: https://api.doubleword.ai/v1
      api_key: os.environ/DOUBLEWORD_API_KEY

  # ── Text-only chat (non-vision tasks) ──────────────────────────────────
  - model_name: chat-primary
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 5
  fallbacks:
    - vision-primary: ["vision-primary-large", "vision-fallback-1"]
    - vision-primary-large: ["vision-fallback-1"]

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
