services:
  backend:
    build:
      context: fastapi_backend
    environment:
      - OPENAPI_OUTPUT_FILE=./shared-data/openapi.json
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/mydatabase
      - ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}
      - RESET_PASSWORD_SECRET_KEY=${RESET_PASSWORD_SECRET_KEY}
      - VERIFICATION_SECRET_KEY=${VERIFICATION_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DOUBLEWORD_API_KEY=${DOUBLEWORD_API_KEY:-}
      - CHANDRA_API_KEY=${CHANDRA_API_KEY:-}
      - LITELLM_BASE_URL=http://litellm:4000
      - HF_HOME=/root/.cache/huggingface
      - BLOB_BACKEND=${BLOB_BACKEND:-local}
      - BLOB_LOCAL_PATH=${BLOB_LOCAL_PATH:-/data/blobs}
    ports:
      - "8000:8000"
    networks:
      - my_network
    volumes:
      - ./local-shared-data:/app/shared-data
      - hf-cache:/root/.cache/huggingface
      - blob_data:/data/blobs
    depends_on:
      - db
      - litellm
    develop:
      watch:
        - action: sync
          path: ./fastapi_backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./fastapi_backend/pyproject.toml
        - action: rebuild
          path: ./fastapi_backend/uv.lock
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DOUBLEWORD_API_KEY=${DOUBLEWORD_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-triple-h-dev-key}
    networks:
      - my_network
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
  frontend:
    build:
      context: ./nextjs-frontend
    ports:
      - "3000:3000"
    networks:
      - my_network
    environment:
      NODE_ENV: development
      API_BASE_URL: http://backend:8000
      OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
    volumes:
      - ./local-shared-data:/app/shared-data
    develop:
      watch:
        - action: sync
          path: ./nextjs-frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./nextjs-frontend/package.json
        - action: rebuild
          path: ./nextjs-frontend/bun.lock
volumes:
  postgres_data:
  hf-cache:
  blob_data:

networks:
  my_network:
    driver: bridge
