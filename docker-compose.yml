services:
  backend:
    build:
      context: fastapi_backend
    environment:
      - OPENAPI_OUTPUT_FILE=./shared-data/openapi.json
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/mydatabase
      - ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}
      - RESET_PASSWORD_SECRET_KEY=${RESET_PASSWORD_SECRET_KEY}
      - VERIFICATION_SECRET_KEY=${VERIFICATION_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DOUBLEWORD_API_KEY=${DOUBLEWORD_API_KEY:-}
      - CHANDRA_API_KEY=${CHANDRA_API_KEY:-}
      - LITELLM_BASE_URL=http://litellm:4000
      - HF_HOME=/root/.cache/huggingface
      - BLOB_BACKEND=${BLOB_BACKEND:-local}
      - BLOB_LOCAL_PATH=${BLOB_LOCAL_PATH:-/data/blobs}
      # Observability — see app/observability.py. OTEL_ENABLED=true
      # plus an empty OTEL_EXPORTER_OTLP_ENDPOINT means spans render
      # to console (docker logs). Point endpoint at jaeger:4317 / a
      # SigNoz collector / Grafana Tempo when you wire one up.
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-triple-h-backend}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # GrowthBook — both must be set for the SDK to boot. Until you
      # complete the GrowthBook UI bootstrap (create project, copy
      # SDK key) the backend treats every flag as off → safe defaults.
      - GROWTHBOOK_API_HOST=${GROWTHBOOK_API_HOST:-http://growthbook:3100}
      - GROWTHBOOK_CLIENT_KEY=${GROWTHBOOK_CLIENT_KEY:-}
      # Langfuse — currently consumed by the litellm container only
      # (success_callback). Forwarded here so any future backend-side
      # direct Langfuse SDK calls read the same Settings.
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8000:8000"
    networks:
      - my_network
    volumes:
      - ./local-shared-data:/app/shared-data
      - hf-cache:/root/.cache/huggingface
      - blob_data:/data/blobs
    depends_on:
      - db
      - litellm
    develop:
      watch:
        - action: sync
          path: ./fastapi_backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./fastapi_backend/pyproject.toml
        - action: rebuild
          path: ./fastapi_backend/uv.lock
  # Extraction queue worker. Shares the backend image (same code, same
  # deps) but runs `python -m app.worker` instead of uvicorn. Polls the
  # extraction_job table, claims pending jobs, runs the pipeline,
  # writes results back. Scales horizontally — multiple replicas are
  # safe thanks to FOR UPDATE SKIP LOCKED in job_queue.claim_next_pending.
  worker:
    build:
      context: fastapi_backend
    command: ["python", "-m", "app.worker"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/mydatabase
      # Worker doesn't issue tokens but app.config.Settings requires these
      # at import time. Mirror the backend's values.
      - ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}
      - RESET_PASSWORD_SECRET_KEY=${RESET_PASSWORD_SECRET_KEY}
      - VERIFICATION_SECRET_KEY=${VERIFICATION_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DOUBLEWORD_API_KEY=${DOUBLEWORD_API_KEY:-}
      - CHANDRA_API_KEY=${CHANDRA_API_KEY:-}
      - LITELLM_BASE_URL=http://litellm:4000
      - HF_HOME=/root/.cache/huggingface
      - BLOB_BACKEND=${BLOB_BACKEND:-local}
      - BLOB_LOCAL_PATH=${BLOB_LOCAL_PATH:-/data/blobs}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_SERVICE_NAME=triple-h-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - GROWTHBOOK_API_HOST=${GROWTHBOOK_API_HOST:-http://growthbook:3100}
      - GROWTHBOOK_CLIENT_KEY=${GROWTHBOOK_CLIENT_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    networks:
      - my_network
    volumes:
      - hf-cache:/root/.cache/huggingface
      # Worker reads the same blob_data volume so it can fetch the PDF
      # bytes the route persisted at upload time.
      - blob_data:/data/blobs
    depends_on:
      - db
      - litellm
    develop:
      watch:
        - action: sync+restart
          path: ./fastapi_backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./fastapi_backend/pyproject.toml
        - action: rebuild
          path: ./fastapi_backend/uv.lock
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DOUBLEWORD_API_KEY=${DOUBLEWORD_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-triple-h-dev-key}
      # Toggle to DEBUG for full request-body dumps when debugging
      # callback/metadata flow. INFO in normal operation.
      - LITELLM_LOG=${LITELLM_LOG:-INFO}
      # Langfuse callback — captures every LLM call (prompt, response,
      # tokens, cost, latency) into the Langfuse UI. Empty values
      # disable the callback gracefully (LiteLLM logs a warning).
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    networks:
      - my_network
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # Ephemeral Postgres on host port 5433 for the auth-integration tests
  # in tests/main/. Conftest's engine fixture runs Base.metadata.create_all
  # then drop_all per-function, so the DB has to be separate from `db`
  # (which holds dev data we don't want wiped). No volume — every container
  # restart starts clean.
  test-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      # Must match TEST_DATABASE_URL in fastapi_backend/.env. Conftest's
      # engine fixture connects to this DB, runs create_all/drop_all per
      # function — so it has to exist at container start.
      POSTGRES_DB: tripleh_test
    ports:
      - "5433:5432"
    networks:
      - my_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 1s
      timeout: 3s
      retries: 30
    profiles: ["test"]
  # ── Langfuse: LLM observability (traces, prompts, costs, eval) ──────
  # v2 minimal: single web container + dedicated Postgres. v3 adds
  # ClickHouse + Redis + worker for higher event volume — overkill
  # for solo-dev / single-tenant scale. Upgrade when ingestion volume
  # demands it.
  #
  # First-boot bootstrap (one-time):
  #   1. mise docker:up
  #   2. open http://localhost:3001 → create org/project
  #   3. settings → API keys → create new → copy public + secret keys
  #   4. mise env:addkey  (LANGFUSE_PUBLIC_KEY then LANGFUSE_SECRET_KEY)
  #   5. mise docker:up   (restart picks up keys for LiteLLM callback)
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-dev-langfuse-nextauth-secret-change-in-prod}
      - SALT=${LANGFUSE_SALT:-dev-langfuse-salt-change-in-prod}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_DEFAULT_PROJECT_ROLE=ADMIN
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - my_network

  langfuse-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - my_network

  # ── GrowthBook: feature flags + experiments ─────────────────────────
  # GrowthBook image binds two ports internally:
  #   3000 — web UI (browser)
  #   3100 — SDK API (backend container reads from here)
  # Host mapping uses 3031 + 3101 to avoid colliding with the candor
  # GrowthBook instance some dev machines run on 127.0.0.1:3030/3100.
  # Backend in the docker network still reaches the SDK on the internal
  # port via `http://growthbook:3100` — only host mapping changed.
  #
  # First-boot bootstrap (one-time):
  #   1. mise docker:up
  #   2. open http://localhost:3031 → create org/project
  #   3. settings → SDK Connections → create → copy SDK key
  #   4. mise env:addkey GROWTHBOOK_CLIENT_KEY  (the SDK key from #3)
  #   5. features → Add Feature → key=use_arq_pipeline, type=Boolean,
  #      default=false (toggle on for ARQ A/B testing)
  #   6. mise docker:up   (backend restart picks up the key)
  growthbook:
    image: growthbook/growthbook:latest
    ports:
      - "3031:3000"  # web UI: http://localhost:3031
      - "3101:3100"  # SDK API: http://localhost:3101 (browser/host)
    environment:
      # APP_ORIGIN + API_HOST are baked into the web UI bundle and used
      # for CORS — they MUST match the URL the browser actually uses.
      # Defaults work for local-host browsers; set GROWTHBOOK_APP_ORIGIN
      # + GROWTHBOOK_API_HOST_PUBLIC in your shell or .env to reach the
      # UI from a Tailscale peer / LAN host (e.g. http://laughdiemeh:3031
      # + http://laughdiemeh:3101 with Tailscale MagicDNS, or the raw
      # 100.x.y.z IP).
      - APP_ORIGIN=${GROWTHBOOK_APP_ORIGIN:-http://localhost:3031}
      - API_HOST=${GROWTHBOOK_API_HOST_PUBLIC:-http://localhost:3101}
      - JWT_SECRET=${GROWTHBOOK_JWT_SECRET:-dev-growthbook-jwt-secret-change-in-prod}
      - MONGODB_URI=mongodb://gb-mongo:27017/growthbook
    depends_on:
      - gb-mongo
    networks:
      - my_network

  gb-mongo:
    image: mongo:7
    volumes:
      - gb_mongo:/data/db
    networks:
      - my_network

  frontend:
    build:
      context: ./nextjs-frontend
    ports:
      - "3000:3000"
    networks:
      - my_network
    environment:
      NODE_ENV: development
      API_BASE_URL: http://backend:8000
      OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
    volumes:
      - ./local-shared-data:/app/shared-data
    develop:
      watch:
        - action: sync
          path: ./nextjs-frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./nextjs-frontend/package.json
        - action: rebuild
          path: ./nextjs-frontend/bun.lock
volumes:
  postgres_data:
  hf-cache:
  blob_data:
  langfuse_pg:
  gb_mongo:

networks:
  my_network:
    driver: bridge
