services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - pdf-uploads:/app/pdfs
      - paddle-models:/root/.paddlex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/docs"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DOC_EXTRACTOR_URL=http://backend:8002
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pdf-uploads:
  paddle-models:
