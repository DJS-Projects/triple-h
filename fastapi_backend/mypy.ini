[mypy]
python_version = 3.12
files = app/**/*.py
ignore_missing_imports = True
strict = True
plugins = pydantic.mypy

[mypy-fastapi_users.*,fastapi_users_db_sqlalchemy.*]
disallow_subclassing_any = False

[mypy-sqlalchemy.*]
disallow_subclassing_any = False

[mypy-dspy.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-docling_core.*]
implicit_reexport = True
ignore_missing_imports = True

# DSPy stubs absent → Signature/Module resolve to Any; permit subclass.
[mypy-app.refinement.signatures]
disallow_subclassing_any = False

[mypy-app.refinement.pipeline]
disallow_untyped_calls = False

# Test code + ad-hoc commands: keep strict for app/, relax here.
# Test fixtures and pytest decorators routinely return Any; annotating
# every fixture is noise. Real type bugs in app/ stay strict.
[mypy-tests.*,tests_eval.*,commands.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_untyped_decorators = False
disallow_subclassing_any = False
disallow_any_generics = False
check_untyped_defs = False
warn_unused_ignores = False
