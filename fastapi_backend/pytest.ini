[pytest]
asyncio_mode = auto
markers =
    unit: deterministic tests, no API key needed
    eval: end-to-end pipeline eval, requires API key
# Silence known-noisy upstream deprecations so genuine warnings from
# our own code stay visible.  Both targets here are third-party libraries
# we can't fix locally:
#   - dspy ships an `Avatar` module that still uses removed `prefix=`
#     kwargs; we don't import Avatar, but Python loads the module
#     transitively when we touch dspy.
#   - fastapi_mail uses `@model_validator(mode='after')` on a classmethod,
#     deprecated by Pydantic 2.12 in favour of instance methods.
# Remove these filters once we upgrade past dspy 2.x / fastapi-mail
# emits a fix.
filterwarnings =
    ignore:The 'prefix' argument in InputField/OutputField is deprecated.*:DeprecationWarning:dspy.*
    ignore:Using `@model_validator` with mode='after' on a classmethod.*:pydantic.PydanticDeprecatedSince212:fastapi_mail.*
